name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/web-docs-deployed
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: target

      - name: Deploy
        run: |
          # Copy build output to target repo
          rm -rf target/*
          cp -r dist/. target/

          # Commit and push
          cd target
          git config user.name "ziez-bot"
          git config user.email "bot@ziez.dev"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
