name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          TARGET_URL="https://x-access-token:${TOKEN}@github.com/ziez-dev/docs.git"

          # Init fresh repo from dist
          cd dist
          git init
          git config user.name "ziez-bot"
          git config user.email "bot@ziez.dev"
          git checkout -b main
          git add -A
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')" || echo "Nothing to commit"

          # Force push (safe for empty or existing repo)
          git push "$TARGET_URL" main --force
